name: .Net Build DotNetCliTool

on:
  push:
    paths: 
      - 'src/**'
  pull_request:
    paths: 
      - 'src/**'
  workflow_dispatch:
  
jobs:
  build:

    defaults: 
      run:
        working-directory: src
        
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
  
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 10.0.100
    - name: Build
      run: dotnet build CheckDependencies.sln --configuration Release 

    - name: Upload CheckNugetPackages.DotNetCliTool
      uses: actions/upload-artifact@v4
      with:
        name: CheckNugetPackages.DotNetCliTool
        path: src/CheckNugetPackages.DotNetCliTool/nupkg/*.nupkg

    - name: Upload CheckNugetPackages.DotNetMcpTool
      uses: actions/upload-artifact@v4
      with:
        name: CheckNugetPackages.DotNetMcpTool
        path: src/CheckNugetPackages.DotNetMcpTool/nupkg/*.nupkg

    - name: Upload CheckNpmPackages.DotNetCliTool
      uses: actions/upload-artifact@v4
      with:
        name: CheckNpmPackages.DotNetCliTool
        path: src/CheckNpmPackages.DotNetCliTool/nupkg/*.nupkg

    - name: Upload CheckNpmPackages.DotNetMcpTool
      uses: actions/upload-artifact@v4
      with:
        name: CheckNpmPackages.DotNetMcpTool
        path: src/CheckNpmPackages.DotNetMcpTool/nupkg/*.nupkg

    - name: Publish CheckNugetPackages.DotNetCliTool to NuGet
      if: startsWith(github.ref, 'refs/tags/releases/v')
      run: |
        dotnet nuget push "CheckNugetPackages.DotNetCliTool/nupkg/*.nupkg" \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Publish CheckNugetPackages.DotNetMcpTool to NuGet
      if: startsWith(github.ref, 'refs/tags/releases/v')
      run: |
        dotnet nuget push "CheckNugetPackages.DotNetMcpTool/nupkg/*.nupkg" \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Publish CheckNpmPackages.DotNetCliTool to NuGet
      if: startsWith(github.ref, 'refs/tags/releases/v')
      run: |
        dotnet nuget push "CheckNpmPackages.DotNetCliTool/nupkg/*.nupkg" \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Publish CheckNpmPackages.DotNetMcpTool to NuGet
      if: startsWith(github.ref, 'refs/tags/releases/v')
      run: |
        dotnet nuget push "CheckNpmPackages.DotNetMcpTool/nupkg/*.nupkg" \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
